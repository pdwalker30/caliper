# ============================================================================
# Caliper sample eval — code review
# ============================================================================
# This is the public-safe demo eval. Five classic vulnerability snippets, two
# prompts (a terse baseline + a structured variant), one judge prompt, four
# rubric dimensions (finds_bug, severity_accuracy, actionability,
# no_false_alarms).
#
# Run:
#   caliper-check examples/code_review/eval_config.yaml
#   caliper-eval  examples/code_review/eval_config.yaml
#
# Fork this folder layout for your own evals — change the snippets, prompts,
# rubric dimensions, and models. The framework is fully driven by these files.

# ----------------------------------------------------------------------------
# Campaign identity
# ----------------------------------------------------------------------------
# `name` is stamped on every trace as the campaign tag and is used by
# caliper-calibrate to find this eval's traces. Pick something distinctive.
name: "code-review-sample"

# Langfuse Dataset that snippets are loaded into. Idempotent on name +
# item ids — re-runs upsert, never duplicate.
dataset_name: "caliper-sample-code-snippets-v1"

# ----------------------------------------------------------------------------
# Asset paths (relative to THIS file's parent directory)
# ----------------------------------------------------------------------------
test_cases_dir: "code_snippets"
prompts_dir: "prompts"
judge_prompts_dir: "judge_prompts"
rubrics_dir: "rubrics"                    # NEW — first-class rubric folder
default_rubric: "standard-code-review"    # NEW — used when a test case omits its `rubric` field

# ----------------------------------------------------------------------------
# Judge configuration
# ----------------------------------------------------------------------------
# Which judge prompt folder to use (must exist under judge_prompts_dir).
judge_prompt: "rubric_judge_v1"

# Model alias (from litellm_config.yaml) the judge runs against.
# Cheap, instruction-following judges are usually the right default —
# the judge does N calls per matrix where N == total cells, so cost adds up.
judge_model: "gpt-4o-mini"

# ----------------------------------------------------------------------------
# Models under test
# ----------------------------------------------------------------------------
# Each entry is an alias from litellm_config.yaml. The Cartesian runs every
# (prompt × model × snippet × iteration). Two models here ⇒ two columns in
# the Experiments comparison view per prompt.
models:
  - "gpt-4o-mini"
  - "claude-haiku"

# ----------------------------------------------------------------------------
# Cell count knob
# ----------------------------------------------------------------------------
# Per (prompt, model, snippet) cell, run N iterations. More iterations =
# smaller variance per cell at higher LLM cost. Two is enough to show the
# framework; bump to 5+ when you have a judge prompt you trust.
iterations: 2

# Total cells for this sample: 2 prompts × 2 models × 5 snippets × 2 iters = 40
# Each cell = 1 LLM call + 1 judge call = 2 LLM calls
# Total LLM calls per pass: ~80. At gpt-4o-mini pricing, well under $1.

# ----------------------------------------------------------------------------
# Concurrency
# ----------------------------------------------------------------------------
# Number of Cartesian cells executed in parallel via ThreadPoolExecutor.
# Default is 10. Raise for faster passes against generous rate limits;
# set to 1 for serial execution (useful when debugging a flaky provider).
# Per-cell retry/backoff handles 429s gracefully regardless of concurrency.
#
# Override per-run from the CLI:  caliper-eval --concurrency 20 <config>
concurrency: 10

# ----------------------------------------------------------------------------
# Optional: extra metadata stamped on every Dataset Run
# ----------------------------------------------------------------------------
extra_run_metadata:
  purpose: "Caliper public sample eval"
  ruleset: "code-review-rubric-v1"

# ----------------------------------------------------------------------------
# Langfuse model-name mapping (optional)
# ----------------------------------------------------------------------------
# When LiteLLM returns a model name Langfuse's pricing map doesn't recognize
# (e.g., Databricks-served models, custom fine-tunes), Langfuse can't compute
# server-side cost. Map the LiteLLM-returned name -> a name Langfuse knows.
#
# How to find the LiteLLM-returned name: run a single eval cell, open the
# trace's generation in Langfuse UI, look at the `model` field. That string
# is what goes on the LEFT side of the mapping below.
#
# Empty for this sample — the cheap-model aliases here are already in
# Langfuse's built-in pricing map.
langfuse_model_mapping: {}
# Example for Databricks-backed models:
# langfuse_model_mapping:
#   "databricks-llama-3-70b-instruct": "llama-3-70b-instruct"
#   "databricks/claude-via-bedrock": "claude-sonnet-4-5"

# ----------------------------------------------------------------------------
# Retry / backoff for LLM calls
# ----------------------------------------------------------------------------
# Defaults are sane for typical hosted-LLM rate limits. Bump max_attempts /
# max_wait_seconds if you're sustained-throttled.
retry:
  max_attempts: 5
  initial_wait_seconds: 2.0
  max_wait_seconds: 60.0
  exponential_base: 2.0
  jitter_seconds: 1.0
  retry_on_statuses: [408, 425, 429, 500, 502, 503, 504]

# ----------------------------------------------------------------------------
# Idempotency
# ----------------------------------------------------------------------------
# Opt-in. When true, Caliper hashes every Cartesian cell over (campaign,
# prompt text, judge text, model, judge model, snippet content, expected,
# rubric, iteration). Cells whose hash exists on a prior trace are skipped.
#
# Edit a prompt -> hash changes -> cell re-runs. No version field to bump.
# Override for one run: caliper-eval --force examples/code_review/eval_config.yaml
idempotent: true

# ----------------------------------------------------------------------------
# Human review (calibration)
# ----------------------------------------------------------------------------
# OFF in this sample so first-time users get a clean green pass without
# the annotation-queue REST API in the picture. Flip enabled to true when
# you want the human-in-the-loop calibration loop active.
human_review:
  enabled: false
  queue_name: "code-review-sample-calibration"
  # "auto" picks target sample count from caps + floors below, distributed
  # evenly across Runs. Recommended over "stratified" or "random" because it
  # adapts to matrix size: tiny matrices get all samples, huge matrices get
  # capped at max_samples to protect human time.
  sample_strategy: "auto"
  min_samples: 20      # statistical floor — below ~20, calibration CIs explode
  min_pct: 0.05        # OR 5% of total cells, whichever is larger
  max_samples: 100     # human-time ceiling — diminishing returns past 100
  max_pct: 0.20        # OR 20% of total, whichever is smaller
  auto_create: true
  # samples_per_run: 2     # only used when sample_strategy = "stratified"
  # sample_rate: 0.15      # only used when sample_strategy = "random"

# ----------------------------------------------------------------------------
# Judge modes
# ----------------------------------------------------------------------------
# "anchored" judge sees the test case's expected/ground-truth reference.
# "blind"    judge sees only the code + the LLM's review (no cheat sheet).
#
# Running both side-by-side detects reference bias. If anchored scores
# are consistently 0.2+ higher than blind, the LLM under test is being
# rewarded for "guessing" what the judge already knows. The blind score
# is the better proxy for production behavior (reviewers in real use
# don't have the reference).
#
# Blind scores get a __blind suffix on every score name in Langfuse:
# `finds_bug__blind`, `finds_bug__pass__blind`, `overall__blind`, etc.
#
# Cost: each extra mode = one extra judge call per cell. Cheap with
# small judge models.
judge_modes: ["anchored"]
# judge_modes: ["anchored", "blind"]   # uncomment to enable bias detection

# ----------------------------------------------------------------------------
# Subsetting (optional)
# ----------------------------------------------------------------------------
# When set, only the listed folder ids participate in the Cartesian. Empty /
# omitted = run everything in prompts_dir / test_cases_dir (default behavior).
#
# Use cases:
#   - Quick smoke test: 1 prompt + 1 snippet for a cheap local iteration
#   - A/B comparison: exactly the two prompts you're comparing this round
#   - Snippet drilldown: when one snippet misbehaves, subset to just that one
#
# The Langfuse Dataset still gets bootstrapped with ALL test cases. The
# subset only affects which cells get RUN this pass — so toggling subsets
# doesn't churn the persistent dataset.
#
# Missing ids (in the list but not on disk) produce a WARN but don't fail.

prompt_ids: []
# prompt_ids:
#   - "structured_reviewer"      # only run this prompt this pass

test_case_ids: []
# test_case_ids:
#   - "sql_injection_login"
#   - "xss_profile_page"          # only run against these two snippets
